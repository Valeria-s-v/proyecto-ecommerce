<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Jolie</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/registro.css">
</head>
<body class="bg-dark text-white"> <header>
    </header>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <h2 class="text-center mb-4" style="color: #c5a36c; font-family: 'Playfair Display', serif;">Crear Cuenta</h2>
            
            <form class="p-4 border rounded shadow-sm" style="background-color: #222; border-color: #c5a36c !important;">
                
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre y Apellido</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="nombre" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="dni" class="form-label">DNI</label>
                        <input type="number" class="form-control bg-dark text-white border-secondary" id="dni" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="nacionalidad" class="form-label">Nacionalidad</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="nacionalidad">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="provincia" class="form-label">Provincia</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="provincia">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="ciudad" class="form-label">Ciudad</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="ciudad">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control bg-dark text-white border-secondary" id="email" placeholder="nombre@ejemplo.com" required>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-gold">Registrarse</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
