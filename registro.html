<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jolie | Registro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/registro.css" />
  </head>
  <body class="registro">
    <header>
      <nav>
        <a href="index.html">
          <img src="img/logo-oficial.png" alt="Logo de Jolie" class="logo" />
        </a>
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="productos.html">Productos</a></li>
          <li><a href="catalogo.html">Catálogo</a></li>
        </ul>
        <div class="header-icons">
          <i class="fa-solid fa-magnifying-glass"></i>
          <a href="registro.html" style="color: inherit; text-decoration: none">
            <i class="fa-solid fa-user"></i>
          </a>
          <i class="fa-solid fa-cart-shopping"></i>
        </div>
      </nav>
    </header>
    <main>
      <!-- Armado de Formulario de Registro -->

      <h1>Registrarse</h1>
      <p class="subtitle">Ingresá tus datos para crear tu cuenta</p>
      <section class="form-container">
        <form id="form" action="#">
          <!-- Nombre y Apellido -->
          <div class="form-row">
            <div class="form-group">
              <label for="nombre">Nombre*</label>
              <input type="text" id="nombre" required placeholder="Nombre" />
            </div>
            <div class="form-group">
              <label for="apellido">Apellido*</label>
              <input type="text" id="apellido" required placeholder="Apellido"/>
            </div>
          </div>

          <!-- Correo electrónico -->
          <div class="form-group">
            <label for="email">Email*</label>
            <input type="email" id="email" required placeholder="tu@email.com"/>
          </div>

          <!-- Teléfono -->
          <div class="form-group-label">
            <p>Teléfono de contacto</p>
          </div>
          <div class="form-row">
            <div class="form-group small">
              <label for="codigoArea">Código de área*</label>
              <input type="text" id="codigoArea" required placeholder="Código de área" maxlength="4"/>
            </div>
            <div class="form-group">
              <label for="telefono">Número de teléfono*</label>
              <input type="tel" id="telefono" required placeholder="Número de teléfono"/>
            </div>
          </div>

          <!-- Contraseña -->
          <div class="form-row">
            <div class="form-group password-group">
              <label for="contrasena">Contraseña*</label>
              <div class="password-input">
                <input type="password" id="contrasena" required placeholder="Contraseña"/>
                <button type="button" class="toggle-password" data-target="contrasena" tabindex="-1">
                  <i class="fa-solid fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="form-group password-group">
              <label for="repetirContrasena">Repetir contraseña*</label>
              <div class="password-input">
                <input type="password" id="repetirContrasena" required placeholder="Repetir contraseña"/>
                <button type="button" class="toggle-password" data-target="repetirContrasena" tabindex="-1">
                  <i class="fa-solid fa-eye"></i>
                </button>
              </div>
            </div>
          </div>
            <!-- Checkbox Términos -->
                <div class="form-check">
                    <input type="checkbox" id="terminos" name="terminos" required>
                    <label class="form-check-label" for="terminos">Acepto los términos y condiciones*</label>
                </div>
          <!-- Link Login -->
          <div class="form-group button-container">
            <button class="btn btn-primary" type="submit">Registrarse</button>
            <button class="btn btn-danger" type="reset">Limpiar Formulario</button>
          </div>
          <div class="login-link">
            <p>¿Ya tenés cuenta? <a href="login.html">Inicia sesión acá</a></p>
          </div>
        </form>
      </section>
    </main>
    <footer>
      <ul class="footer-nav">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="productos.html">Productos</a></li>
        <li><a href="catalogo.html">Catálogo</a></li>
      </ul>
      <p>&copy; 2026 Jolie. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
