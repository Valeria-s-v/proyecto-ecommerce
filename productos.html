<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jolie | Productos</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/productos.css" />
  </head>
  <body>
    <header>
      <nav>
        <a href="index.html">
          <img src="img/logo-oficial.png" alt="Logo de Jolie" class="logo" />
        </a>
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="productos.html">Productos</a></li>
          <li><a href="catalogo.html">Catálogo</a></li>
        </ul>
        <div class="header-icons">
          <i class="fa-solid fa-magnifying-glass"></i>
          <a href="registro.html" style="color: inherit; text-decoration: none">
            <i class="fa-solid fa-user"></i>
          </a>
          <i class="fa-solid fa-cart-shopping"></i>
        </div>
      </nav>
    </header>
    <main class="productos-page">
      <h1>Productos</h1>

      <!-- Controles de búsqueda y filtrado -->
      <section class="productos-controles">
        <div class="controles-top">
          <input
            type="text"
            class="buscador"
            placeholder="🔍 Buscar productos..."/>
          <select class="ordenar">
            <option value="">Ordenar por</option>
            <option value="menor">Menor precio</option>
            <option value="mayor">Mayor precio</option>
            <option value="nuevo">Más nuevo</option>
          </select>
        </div>
        <div class="filtros">
          <button class="filtro-btn active">Todos</button>
          <button class="filtro-btn">Ropa</button>
          <button class="filtro-btn">Accesorios</button>
          <button class="filtro-btn">Calzado</button>
        </div>
      </section>

      <!-- Grid de productos -->
      <section class="productos">
        <div class="product-grid">
          <div class="product-card">
            <img src="img/blusa_chic.png" alt="Blusa Chic" />
            <h3>Blusa Chic</h3>
            <p class="precio">$29.000</p>
          </div>
          <div class="product-card">
            <img src="img/cartera.jpg" alt="Cartera" />
            <h3>Cartera</h3>
            <p class="precio">$30.000</p>
          </div>
          <div class="product-card">
            <img src="img/gafa.jpg" alt="Gafas de sol" />
            <h3>Gafas de sol</h3>
            <p class="precio">$56.000</p>
          </div>
        </div>
      </section>
    </main>
    <footer>
      <ul class="footer-nav">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="productos.html">Productos</a></li>
        <li><a href="catalogo.html">Catálogo</a></li>
      </ul>
      <p>&copy; 2026 Jolie. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
